# Exclusion Detection Keywords
# Organized by category for the payer exclusion scrubber

exclusion_types:
  - excluded
  - exclusion
  - non-covered
  - not covered
  - disallowed

medical_necessity:
  - not reasonable and necessary
  - medical necessity criteria updated
  - experimental
  - investigational
  - unproven
  - cosmetic

authorization:
  - prior authorization
  - precertification
  - site of service

policy_related:
  - archived
  - deleted policy
  - coding update
  - payment policy
  - claim edit

billing:
  - not separately billable
  - self-administered drug exclusion

  def load_keywords(path: Path) -> list[str]:
    raw = yaml.safe_load(path.read_text())
    terms = []
    for group_terms in raw.values():
        terms.extend(group_terms)
    return sorted(set(terms))

    
